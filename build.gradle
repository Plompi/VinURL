plugins {
	id "net.fabricmc.fabric-loom" version "${plg_fabric_loom}"
	id "org.moddedmc.wiki.toolkit" version "${plg_moddedmc_wiki}"
}

var mod_version = file('CHANGELOG.md').text.find(/Version: (.+)/) { _, version -> version }
version = "${mod_version}+mc${mod_minecraft_version}"

base {
	archivesName = mod_id
}

repositories {
	maven { url = "https://maven.wispforest.io" }
	maven { url = "https://jitpack.io" }
}

dependencies {
	annotationProcessor implementation("io.wispforest:owo-lib:${run_owo_version}")
	minecraft "com.mojang:minecraft:${run_minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${run_fabric_loader_version}"
	implementation "net.fabricmc.fabric-api:fabric-api:${run_fabric_version}"
}

processResources {
	var replaceProperties = [
			mod_version               		: mod_version,
			mod_id							: mod_id,
			mod_name						: mod_name,
			mod_license                     : mod_license,
			mod_author                      : mod_author,
			mod_credits                     : mod_credits,
			mod_description                 : mod_description,
			mod_url                         : mod_url,

			mod_minecraft_version			: mod_minecraft_version,
	]
	inputs.properties replaceProperties
	filesMatching(['fabric.mod.json', 'META-INF/neoforge.mods.toml']) {
		expand replaceProperties
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

java {
	toolchain.languageVersion = JavaLanguageVersion.of(25)
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	if (!project.hasProperty('neoforge')) {
		exclude('META-INF/**')
	}
	from("LICENSE") {
		rename { "${it}_${mod_id}" }
	}
}

wiki {
	docs {
		vinurl {
			root = file("docs")
		}
	}
	wikiAccessToken = System.getenv('WIKI_TOKEN')
}